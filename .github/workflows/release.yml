name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish
        run: dotnet publish --configuration Release

      - name: List publish output
        shell: pwsh
        run: |
          $publishDir = "bin\Release\net10.0-windows10.0.19041.0\win-x64\publish"
          Write-Host "=== PRI files ==="
          Get-ChildItem -Path $publishDir -Filter *.pri -Recurse | ForEach-Object { $_.FullName }
          Write-Host "=== XBF files ==="
          Get-ChildItem -Path $publishDir -Filter *.xbf -Recurse | ForEach-Object { $_.FullName }
          Write-Host "=== XAML files ==="
          Get-ChildItem -Path $publishDir -Filter *.xaml -Recurse | ForEach-Object { $_.FullName }
          Write-Host "=== Root files ==="
          Get-ChildItem -Path $publishDir -File | ForEach-Object { $_.Name }

      - name: Build installer
        run: iscc /DAPP_VERSION="${{ github.ref_name }}" installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: output/WslUsbBridge-Setup-x64.exe
