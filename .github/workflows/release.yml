name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish
        run: dotnet publish --configuration Release

      - name: List build and publish output
        shell: pwsh
        run: |
          $buildDir = "bin\Release\net10.0-windows10.0.19041.0\win-x64"
          $publishDir = "$buildDir\publish"
          Write-Host "=== BUILD: PRI files ==="
          Get-ChildItem -Path $buildDir -Filter *.pri -Depth 0 | ForEach-Object { $_.Name }
          Write-Host "=== BUILD: XBF files ==="
          Get-ChildItem -Path $buildDir -Filter *.xbf -Recurse -Depth 1 | ForEach-Object { $_.FullName }
          Write-Host "=== PUBLISH: PRI files ==="
          Get-ChildItem -Path $publishDir -Filter *.pri -Recurse | ForEach-Object { $_.Name }
          Write-Host "=== PUBLISH: XBF files ==="
          Get-ChildItem -Path $publishDir -Filter *.xbf -Recurse | ForEach-Object { $_.FullName }

      - name: Build installer
        run: iscc /DAPP_VERSION="${{ github.ref_name }}" installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: output/WslUsbBridge-Setup-x64.exe
